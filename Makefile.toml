# cargo-make tasks for the network-usb workspace.
#
# Install once: `cargo install cargo-make`
# Then: `cargo make <task>`. List tasks: `cargo make --list-all-steps`.
#
# Conventions:
#   build-*    -> compile (release) for one platform
#   install-*  -> build + run the platform installer (needs sudo / admin)
#   pair-*     -> one-shot pair flow on the corresponding side
#   verify-*   -> read-only checks (test, clippy, fmt)
#
# Cross-platform tasks (build-all, test, clippy, fmt) work everywhere.
# Platform-specific tasks (deck-*, win-*) refuse to run on the wrong OS via
# `condition.platforms`.

[config]
default_to_workspace = false
skip_core_tasks = true
min_version = "0.37.0"

# ---------------------------------------------------------------- defaults

[tasks.default]
description = "Show available tasks"
script_runner = "@duckscript"
script = '''
exec --fail-on-error cargo make --list-all-steps
'''

# ---------------------------------------------------------------- verify

[tasks.test]
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace"]

[tasks.clippy]
description = "Lint the entire workspace; fail on warnings"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.fmt-check]
description = "Verify formatting (rustfmt)"
command = "cargo"
args = ["fmt", "--all", "--check"]

[tasks.fmt]
description = "Apply rustfmt to the workspace"
command = "cargo"
args = ["fmt", "--all"]

[tasks.verify]
description = "Run test + clippy + fmt-check"
dependencies = ["test", "clippy", "fmt-check"]

# ---------------------------------------------------------------- build

[tasks.build-all]
description = "Release build of every workspace member (cross-platform stubs allowed)"
command = "cargo"
args = ["build", "--workspace", "--release"]

[tasks.build-deck]
description = "Release build of server-deck + kiosk-deck (Linux only)"
condition = { platforms = ["linux"] }
command = "cargo"
args = ["build", "--release", "-p", "server-deck", "-p", "kiosk-deck"]

[tasks.build-win]
description = "Release build of client-win (Windows only)"
condition = { platforms = ["windows"] }
command = "cargo"
args = ["build", "--release", "-p", "client-win"]

# ---------------------------------------------------------------- install

[tasks.install-deck]
description = "Build Deck binaries + run the Deck installer (Linux, needs sudo)"
condition = { platforms = ["linux"] }
dependencies = ["build-deck"]
script = '''
#!/usr/bin/env bash
set -euo pipefail
sudo bash scripts/install-deck.sh
'''

[tasks.install-win]
description = "Build client-win + run the Windows installer (Windows, needs admin)"
condition = { platforms = ["windows"] }
dependencies = ["build-win"]
script_runner = "powershell"
script_extension = "ps1"
script = '''
$ErrorActionPreference = "Stop"
& powershell -ExecutionPolicy Bypass -File scripts\install-windows.ps1
'''

# ---------------------------------------------------------------- pair

[tasks.pair-deck]
description = "Run the one-shot pair flow on the Deck (Linux, needs sudo)"
condition = { platforms = ["linux"] }
script = '''
#!/usr/bin/env bash
set -euo pipefail
sudo /usr/local/bin/server-deck pair --state-dir /var/lib/network-deck
'''

[tasks.pair-win]
description = "Run the one-shot pair flow on Windows"
condition = { platforms = ["windows"] }
script_runner = "powershell"
script_extension = "ps1"
script = '''
$ErrorActionPreference = "Stop"
& "$env:LOCALAPPDATA\NetworkDeck\client-win.exe" pair
'''

# ---------------------------------------------------------------- service

[tasks.deck-service-restart]
description = "Restart the network-deck-server systemd unit (Linux, needs sudo)"
condition = { platforms = ["linux"] }
script = '''
#!/usr/bin/env bash
set -euo pipefail
sudo systemctl restart network-deck-server.service
sudo systemctl status --no-pager network-deck-server.service
'''

[tasks.deck-status]
description = "Tail the Deck daemon log (Linux)"
condition = { platforms = ["linux"] }
script = '''
#!/usr/bin/env bash
set -euo pipefail
journalctl -u network-deck-server.service -f
'''
